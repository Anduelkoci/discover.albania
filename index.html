<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Albania</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  
  <h2 class="logo">Discover Albania</h2>
   <div class="menu-toggle">&#9776;</div>
  <nav class="menu">
    <a href="./home.html">Home</a>
    <a href="./cities.html">Cities</a>
    <a href="#">Food</a>
    <a href="#">Nature</a>
    <a href="#">Contact</a>
  </nav>

</header>

<section class="hero">
  <div class="hero-text">
    <h1 class="discover-title-home"
        id="heroTitle"
        data-edit>
        Discover Albania
    </h1>

    <p class="discover-text-home"
       id="heroText"
       data-edit>
      Welcome to Albania, a beautiful country with amazing beaches,
      mountains and culture waiting to be explored.
    </p>

    <a href="./explore.html" class="explore-btn">Explore</a>
  </div>
</section>

<script src="script.js"></script>
<script>

const toggle = document.querySelector(".menu-toggle");
const menu = document.querySelector(".menu");

toggle.onclick = (e) => {
  e.stopPropagation();
  menu.classList.toggle("active");
};

document.addEventListener("click", function(event) {
  if (!menu.contains(event.target) && !toggle.contains(event.target)) {
    menu.classList.remove("active");
  }
});
</script>
</body>
</html>
