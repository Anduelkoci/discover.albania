<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
  


<header class="main-header">

  <div class="logo">
    <a href="index.html">Discover Albania</a>
  </div>
 <div class="menu-toggle">&#9776;</div>
  <nav class="menu">
    <a href="index.html">Home</a>
    <a href="cities.html">Cities</a>
    <a href="explore.html">Explore</a>

  </nav>

</header>
<section class="hero-home">

  <div class="hero-home-text">

    <h1 class="discover-title">Discover Albania</h1>

    <p class="discover-text">
      Explore the beauty of Albania, from vibrant cities
      to amazing beaches and mountains.
    </p>

    <a href="cities.html" class="home-text-btn">Explore Cities</a>

  </div>
</section>
<script src="script.js"></script>
<script>

const toggle = document.querySelector(".menu-toggle");
const menu = document.querySelector(".menu");

toggle.onclick = (e) => {
  e.stopPropagation();
  menu.classList.toggle("active");
};

document.addEventListener("click", function(event) {
  if (!menu.contains(event.target) && !toggle.contains(event.target)) {
    menu.classList.remove("active");
  }
});
</script>
</body>
